services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_PORT: 8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save 60 1
      --save 300 10
      --dbfilename dump.rdb
      --dir /data
      --appendonly no
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  agents-api:
    build: ./agents-seo-core
    image: agents-seo-core:latest
    env_file:
      - .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - tranco-cache:/app/.tranco_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  redis-data:
  tranco-cache:
